<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Holographic Energy</title>
<link rel="shortcut icon" href="favicon32.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #05070D;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

#scene {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* ── SVG flow overlay ─────────────────────────────────────────────────── */
#flow-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
}

/* ── Flow path styles ─────────────────────────────────────────────────── */
.flow-path {
  fill: none;
  stroke-width: 2.5;
  stroke-dasharray: 10 6;
  opacity: 0;
  transition: opacity 0.4s;
}
.flow-path.flow-active {
  opacity: 1;
  animation: dash 1.2s linear infinite;
}
.flow-path.flow-active.flow-rev {
  animation: dash-rev 1.2s linear infinite;
}

@keyframes dash     { to { stroke-dashoffset: -64; } }
@keyframes dash-rev { to { stroke-dashoffset:  64; } }

/* ── Holo nodes ───────────────────────────────────────────────────────── */
.holo-node {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 3;
  user-select: none;
  -webkit-user-select: none;
}

.holo-node img {
  display: block;
  filter: drop-shadow(0 0 14px #6AAEFF) brightness(1.1);
  pointer-events: none;
  transition: filter 0.3s;
}

.holo-node.node-inactive img {
  filter: drop-shadow(0 0 6px rgba(106,174,255,0.3)) brightness(0.55);
}

.node-label {
  margin-top: 10px;
  text-align: center;
  line-height: 1.3;
}
.node-name {
  display: block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #B59CFF;
}
.node-value {
  display: block;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  min-height: 28px;
  line-height: 1.25;
}

/* ── Edit mode ────────────────────────────────────────────────────────── */
.edit-mode .holo-node {
  cursor: grab;
  outline: 1px dashed rgba(255,255,255,0.3);
}
.edit-mode .holo-node:active {
  cursor: grabbing;
}

#edit-badge {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,200,0,0.12);
  border: 1px solid rgba(255,200,0,0.4);
  color: #FFCC00;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 18px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
  z-index: 100;
  display: none;
}

/* ── Nav button ───────────────────────────────────────────────────────── */
#nav-btn {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(106,174,255,0.10);
  border: 1.5px solid rgba(106,174,255,0.35);
  color: #6AAEFF;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(8px);
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  z-index: 999;
  text-decoration: none;
}
#nav-btn:hover {
  background: rgba(106,174,255,0.22);
  border-color: rgba(106,174,255,0.7);
  transform: scale(1.08);
}
</style>
</head>
<body>

<div id="edit-badge">EDIT MODE — drag to reposition</div>

<div id="scene">

  <!-- SVG flow overlay -->
  <svg id="flow-svg">
    <!-- Paths (d attributes set by updatePaths()) -->
    <path id="fp-pv-house"   class="flow-path" stroke="#F5B14C"/>
    <path id="fp-pv-batt"    class="flow-path" stroke="#6AAEFF"/>
    <path id="fp-batt-house" class="flow-path" stroke="#6AAEFF"/>
    <path id="fp-house-grid" class="flow-path" stroke="#FF9C7A"/>
    <path id="fp-house-wb"   class="flow-path" stroke="#52E5FF"/>

    <!-- Flow midpoint value labels -->
    <text id="fl-pv-house"   font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#F5B14C"  opacity="0" text-anchor="middle" dominant-baseline="middle"/>
    <text id="fl-pv-batt"    font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#6AAEFF"  opacity="0" text-anchor="middle" dominant-baseline="middle"/>
    <text id="fl-batt-house" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#6AAEFF"  opacity="0" text-anchor="middle" dominant-baseline="middle"/>
    <text id="fl-house-grid" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#FF9C7A"  opacity="0" text-anchor="middle" dominant-baseline="middle"/>
    <text id="fl-house-wb"   font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#52E5FF"  opacity="0" text-anchor="middle" dominant-baseline="middle"/>
  </svg>

  <!-- Holo nodes -->
  <div id="n-solar" class="holo-node">
    <img src="img/dashboard/huawei.png" alt="Solar" style="width:180px;">
    <div class="node-label">
      <span class="node-name">Solar</span>
      <span class="node-value" id="v-solar">–</span>
    </div>
  </div>

  <div id="n-house" class="holo-node">
    <img src="img/dashboard/home.png" alt="Haus" style="width:240px;">
    <div class="node-label">
      <span class="node-name">Haus</span>
      <span class="node-value" id="v-house">–</span>
    </div>
  </div>

  <div id="n-battery" class="holo-node">
    <img src="img/dashboard/battery.png" alt="Batterie" style="width:160px;">
    <div class="node-label">
      <span class="node-name">Batterie</span>
      <span class="node-value" id="v-battery">–</span>
    </div>
  </div>

  <div id="n-grid" class="holo-node">
    <img src="img/dashboard/grid.png" alt="Netz" style="width:140px;">
    <div class="node-label">
      <span class="node-name">Netz</span>
      <span class="node-value" id="v-grid">–</span>
    </div>
  </div>

  <div id="n-wallbox" class="holo-node">
    <img src="img/dashboard/car.png" alt="Wallbox" style="width:190px;">
    <div class="node-label">
      <span class="node-name">Wallbox</span>
      <span class="node-value" id="v-wallbox">–</span>
    </div>
  </div>

</div><!-- /#scene -->

<!-- Nav button: cycles to energie.html -->
<a id="nav-btn" href="energie.html" title="Energie Flow">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </svg>
</a>

<script src="/socket.io/socket.io.js"></script>
<script src="config.js"></script>
<script>
// ── Edit mode ──────────────────────────────────────────────────────────────
const editMode = new URLSearchParams(location.search).has('edit');

// ── Node metadata: id, image pixel width ──────────────────────────────────
// Heights are approximate render heights used for center calculation.
const NODE_META = {
  'n-solar':   { w: 180, h: 175 },
  'n-house':   { w: 240, h: 215 },
  'n-battery': { w: 160, h: 155 },
  'n-grid':    { w: 140, h: 135 },
  'n-wallbox': { w: 190, h: 165 },
};

// Default positions for ~1600×900 viewport
const DEFAULT_POSITIONS = {
  'n-solar':   { x: 180,  y: 120 },
  'n-house':   { x: 650,  y: 140 },
  'n-battery': { x: 120,  y: 480 },
  'n-grid':    { x: 1200, y: 100 },
  'n-wallbox': { x: 1080, y: 440 },
};

// ── Load/save positions from localStorage ─────────────────────────────────
function loadPositions() {
  try {
    const raw = localStorage.getItem('holo_positions');
    if (raw) {
      const saved = JSON.parse(raw);
      // Validate: must have all node keys
      if (Object.keys(NODE_META).every(k => saved[k] && saved[k].x != null)) {
        return saved;
      }
    }
  } catch (e) {}
  return null;
}

function savePositions() {
  const pos = {};
  Object.keys(NODE_META).forEach(id => {
    const node = document.getElementById(id);
    if (!node) return;
    pos[id] = {
      x: parseFloat(node.style.left) || 0,
      y: parseFloat(node.style.top)  || 0,
    };
  });
  try { localStorage.setItem('holo_positions', JSON.stringify(pos)); } catch (e) {}
}

// ── Apply position object to DOM nodes ────────────────────────────────────
function applyPositions(positions) {
  Object.keys(NODE_META).forEach(id => {
    const node = document.getElementById(id);
    if (!node) return;
    const p = (positions && positions[id]) || DEFAULT_POSITIONS[id] || { x: 0, y: 0 };
    node.style.left = p.x + 'px';
    node.style.top  = p.y + 'px';
  });
}

// ── Get center of a node (top-left position + half image dimensions) ───────
function nodeCenter(id) {
  const node = document.getElementById(id);
  const meta = NODE_META[id];
  if (!node || !meta) return { x: 0, y: 0 };
  return {
    x: (parseFloat(node.style.left) || 0) + meta.w / 2,
    y: (parseFloat(node.style.top)  || 0) + meta.h / 2,
  };
}

// ── Build a smooth cubic bezier path string between two centers ────────────
function bezierD(c1, c2) {
  const mx = (c1.x + c2.x) / 2;
  return `M ${c1.x},${c1.y} C ${mx},${c1.y} ${mx},${c2.y} ${c2.x},${c2.y}`;
}

// ── Midpoint of cubic bezier at t=0.5 ─────────────────────────────────────
function bezierMid(c1, c2) {
  const mx = (c1.x + c2.x) / 2;
  const t  = 0.5;
  function b(a, b2, c, d) {
    return Math.pow(1-t,3)*a + 3*Math.pow(1-t,2)*t*b2 + 3*(1-t)*t*t*c + t*t*t*d;
  }
  return {
    x: b(c1.x, mx,   mx,   c2.x),
    y: b(c1.y, c1.y, c2.y, c2.y),
  };
}

// ── Update all SVG paths after drag or on load ─────────────────────────────
function updatePaths() {
  const solar = nodeCenter('n-solar');
  const house = nodeCenter('n-house');
  const batt  = nodeCenter('n-battery');
  const grid  = nodeCenter('n-grid');
  const wb    = nodeCenter('n-wallbox');

  const connections = [
    { pathId: 'fp-pv-house',   labelId: 'fl-pv-house',   c1: solar, c2: house },
    { pathId: 'fp-pv-batt',    labelId: 'fl-pv-batt',    c1: solar, c2: batt  },
    { pathId: 'fp-batt-house', labelId: 'fl-batt-house', c1: batt,  c2: house },
    { pathId: 'fp-house-grid', labelId: 'fl-house-grid', c1: house, c2: grid  },
    { pathId: 'fp-house-wb',   labelId: 'fl-house-wb',   c1: house, c2: wb    },
  ];

  connections.forEach(({ pathId, labelId, c1, c2 }) => {
    const path  = document.getElementById(pathId);
    const label = document.getElementById(labelId);
    if (!path) return;
    path.setAttribute('d', bezierD(c1, c2));
    if (label) {
      const mid = bezierMid(c1, c2);
      label.setAttribute('x', Math.round(mid.x));
      label.setAttribute('y', Math.round(mid.y));
    }
  });
}

// ── OIDs (verbatim from energie.html) ─────────────────────────────────────
const OIDs = {
  pv:          'modbus.0.inputRegisters.5016_Total_DC_Power',
  load:        'modbus.0.inputRegisters.13007_Load_power_',
  bezug:       '0_userdata.0.Photovoltaik.Smartmeter-EVN.SmartMeter-EVN-Bezug',
  einspeisung: '0_userdata.0.Photovoltaik.Smartmeter-EVN.SmartMeter-EVN-Einspeisung',
  autarkie:    '0_userdata.0.Photovoltaik.Autarkie',
  battSoc:     'bydhvs.0.State.SOC',
  battRem:     '0_userdata.0.Photovoltaik.Battery.Battery-Remaining-Capacity',
  wbPower:     '0_userdata.0.Photovoltaik.Wallbox.Wallbox-Leistung-Aktuell',
  pvDay:       'modbus.0.inputRegisters.13001_Daily_PV_Generation',
  bezugDay:    'modbus.0.inputRegisters.13035_Daily_Import_Energy',
  loadDay:     'sourceanalytix.0.modbus__0__inputRegisters__13007_Load_power_.currentYear.consumed.01_currentDay',
  forecast:    '0_userdata.0.Photovoltaik.PV-Forecast',
};

// ── Live state (verbatim from energie.html) ────────────────────────────────
const live = { pv: 0, load: 0, bezug: 0, einspeisung: 0, wbPower: 0 };
const THRESH = (typeof LUMINA_CONFIG !== 'undefined') ? LUMINA_CONFIG.flowThreshold : 100;

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtW(w) {
  const n = Math.abs(parseFloat(w));
  if (isNaN(n)) return '–';
  return n >= 1000 ? (n / 1000).toFixed(2) + ' kW' : Math.round(n) + ' W';
}

function setFlow(id, active, reverse) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('flow-active', 'flow-rev');
  if (active) {
    el.classList.add('flow-active');
    if (reverse) el.classList.add('flow-rev');
  }
}

function setFlowLabel(id, text, visible) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.setAttribute('opacity', visible ? '1' : '0');
}

// ── Update node labels and flow animations from live state ─────────────────
function updateFlows() {
  const { pv, load, bezug, einspeisung, wbPower } = live;

  // Battery net power: positive = charging, negative = discharging
  const battPow    = pv + bezug - einspeisung - load - wbPower;
  const battCharge = battPow >  THRESH;
  const battDisch  = battPow < -THRESH;
  const battOn     = battCharge || battDisch;

  // Grid
  const gridImp = bezug       > THRESH;
  const gridExp = einspeisung > THRESH;
  const gridOn  = gridImp || gridExp;

  // PV
  const pvOn = pv > THRESH;

  // Wallbox
  const wbOn = wbPower > THRESH;

  // ── Node value spans ───────────────────────────────────────────────────
  // v-solar
  document.getElementById('v-solar').textContent = pvOn ? fmtW(pv) : '–';

  // v-house
  document.getElementById('v-house').textContent = fmtW(load);

  // v-battery
  if (battOn) {
    document.getElementById('v-battery').textContent =
      (battCharge ? '↑' : '↓') + ' ' + fmtW(Math.abs(battPow));
  } else {
    document.getElementById('v-battery').textContent = '–';
  }

  // v-grid
  const gridEl = document.getElementById('v-grid');
  if (gridImp) {
    gridEl.textContent = fmtW(bezug);
    gridEl.style.color = '#FF9C7A';
  } else if (gridExp) {
    gridEl.textContent = '-' + fmtW(einspeisung);
    gridEl.style.color = '#52E5FF';
  } else {
    gridEl.textContent = '0 W';
    gridEl.style.color = '#fff';
  }

  // v-wallbox
  document.getElementById('v-wallbox').textContent = wbOn ? fmtW(wbPower) : '–';

  // ── Node inactive dimming ──────────────────────────────────────────────
  document.getElementById('n-solar').classList.toggle('node-inactive',   !pvOn);
  document.getElementById('n-battery').classList.toggle('node-inactive', !battOn);
  document.getElementById('n-wallbox').classList.toggle('node-inactive', !wbOn);

  // ── Flow paths ─────────────────────────────────────────────────────────
  // Solar → House
  setFlow('fp-pv-house', pvOn, false);
  setFlowLabel('fl-pv-house', pvOn && load > THRESH ? fmtW(load) : '', pvOn && load > THRESH);

  // Solar → Battery (only when charging)
  const pvBattOn = pvOn && battCharge;
  setFlow('fp-pv-batt', pvBattOn, false);
  setFlowLabel('fl-pv-batt', pvBattOn ? fmtW(battPow) : '', pvBattOn);

  // Battery → House (only when discharging)
  setFlow('fp-batt-house', battDisch, false);
  setFlowLabel('fl-batt-house', battDisch ? fmtW(Math.abs(battPow)) : '', battDisch);

  // House ↔ Grid: forward = export (house→grid), reverse = import (grid→house)
  setFlow('fp-house-grid', gridOn, gridImp);
  setFlowLabel('fl-house-grid', gridOn ? fmtW(gridImp ? bezug : einspeisung) : '', gridOn);

  // House → Wallbox
  setFlow('fp-house-wb', wbOn, false);
  setFlowLabel('fl-house-wb', wbOn ? fmtW(wbPower) : '', wbOn);
}

// ── Apply incoming OID value (verbatim from energie.html) ─────────────────
function applyState(oid, val) {
  const n = parseFloat(val);
  switch (oid) {
    case OIDs.pv:          live.pv          = isNaN(n) ? 0 : n;        updateFlows(); break;
    case OIDs.load:        live.load        = isNaN(n) ? 0 : n;        updateFlows(); break;
    case OIDs.bezug:       live.bezug       = isNaN(n) ? 0 : n;        updateFlows(); break;
    case OIDs.einspeisung: live.einspeisung = isNaN(n) ? 0 : n;        updateFlows(); break;
    case OIDs.wbPower:     live.wbPower     = isNaN(n) ? 0 : n * 1000; updateFlows(); break;
    // remaining OIDs subscribed to keep parity with energie.html
    default: break;
  }
}

// ── Socket.io (verbatim connection pattern from energie.html) ─────────────
const socket  = io({ path: '/socket.io' });
const allOids = Object.values(OIDs);

socket.on('connect', () => {
  allOids.forEach(oid => {
    socket.emit('subscribe', oid, { ack: true }, () => {});
    socket.emit('getStates', [oid], (err, states) => {
      if (!states) return;
      const e = states[oid];
      if (!e || e.val === null || e.val === undefined) return;
      applyState(oid, e.val);
    });
  });
});
socket.on('disconnect', () => {});
socket.on('stateChange', (oid, state) => {
  if (!state || state.val === null || state.val === undefined) return;
  applyState(oid, state.val);
});

// Periodic refresh every 5 minutes
setInterval(() => {
  if (!socket || !socket.connected) return;
  allOids.forEach(oid => socket.emit('getStates', [oid], (err, states) => {
    if (!states) return;
    const e = states[oid];
    if (!e || e.val === null || e.val === undefined) return;
    applyState(oid, e.val);
  }));
}, 300000);

// ── Drag handlers (edit mode only) ────────────────────────────────────────
function initDrag(nodeEl) {
  let dragging = false;
  let startX, startY, origX, origY;

  nodeEl.addEventListener('mousedown', e => {
    if (!editMode) return;
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origX  = parseFloat(nodeEl.style.left) || 0;
    origY  = parseFloat(nodeEl.style.top)  || 0;
    nodeEl.style.zIndex = '10';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    nodeEl.style.left = (origX + e.clientX - startX) + 'px';
    nodeEl.style.top  = (origY + e.clientY - startY) + 'px';
    updatePaths();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    nodeEl.style.zIndex = '3';
    savePositions();
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
(function init() {
  // Apply positions from localStorage or defaults
  applyPositions(loadPositions());

  // Draw initial SVG paths
  updatePaths();

  // Edit mode setup
  if (editMode) {
    document.getElementById('edit-badge').style.display = 'block';
    document.getElementById('scene').classList.add('edit-mode');
    Object.keys(NODE_META).forEach(id => {
      const node = document.getElementById(id);
      if (node) initDrag(node);
    });
  }

  // Redraw paths on viewport resize
  window.addEventListener('resize', updatePaths);
})();
</script>

</body>
</html>
