<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Energie Live</title>
<link rel="shortcut icon" href="favicon32.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange:  #FF9900;
  --yellow:  #FFCC00;
  --blue:    #4488FF;
  --teal:    #00AACC;
  --teal2:   #66CCBB;
  --purple:  #CC99FF;
  --lblue:   #99CCFF;
  --green:   #44CC88;
  --red:     #FF5555;
  --bg:      #0c0c15;
  --card-bg: #13131e;
  --card-bd: rgba(255,255,255,0.07);
  --muted:   #666680;
}

body {
  background: var(--bg);
  color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  width: 100vw; height: 100vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}

svg#flow-svg { flex: 1; width: 100%; display: block; }

/* ── Flow path animations ────────────────────────────────────── */
.flow-line {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 10 8;
  stroke-opacity: 0.12;
  transition: stroke 0.4s, stroke-opacity 0.4s;
}
.flow-on  { stroke-opacity: 1 !important; animation: dash-fwd 1.2s linear infinite; }
.flow-rev { stroke-opacity: 1 !important; animation: dash-rev 1.2s linear infinite; }

@keyframes dash-fwd { from { stroke-dashoffset: 36; } to { stroke-dashoffset: 0; } }
@keyframes dash-rev { from { stroke-dashoffset: -36; } to { stroke-dashoffset: 0; } }

/* ── Node glow ring ──────────────────────────────────────────── */
@keyframes pulse-glow {
  0%, 100% { opacity: 0.10; }
  50%       { opacity: 0.28; }
}
.node-ring     { animation: pulse-glow 2.5s ease-in-out infinite; }
.node-ring-off { opacity: 0.05 !important; animation: none !important; }

/* ── Bottom data strip ───────────────────────────────────────── */
#data-strip {
  display: flex; gap: 12px;
  padding: 10px 24px;
  height: 16.1vh;
  flex-shrink: 0;
  align-items: stretch;
}
.d-card {
  flex: 1;
  background: var(--card-bg);
  border: 1px solid var(--card-bd);
  border-radius: 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
}
.d-label { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; }
.d-val   { font-size: 36px; font-weight: 700; color: #fff; line-height: 1; }
.d-val .u { font-size: 18px; font-weight: 400; color: var(--muted); margin-left: 3px; }
.d-val-lg { font-size: 36px; }
</style>
</head>
<body>

<!-- ══ ENERGY FLOW SVG ══════════════════════════════════════════════════════ -->
<!--
  Layout (1920 × 906):
    PV      (960,  151)                WB   (1600, 151)
    Batt    (320,  485)   House (960, 485)   Grid (1600, 485)
  Node radius: 85px
  WB connects: Solar (horizontal left) and Grid (vertical down)
-->
<svg id="flow-svg" viewBox="0 0 1920 906" preserveAspectRatio="xMidYMid meet">

  <!-- ── Flow paths ────────────────────────────────────────────── -->
  <!-- PV (960,236) → House (960,400): vertical -->
  <path id="fp-pv"      class="flow-line" d="M 960,236  L 960,400"   stroke="#FFCC00"/>
  <!-- Solar (875,151) → Battery (320,151) → Battery (320,400): L-shape left then down -->
  <path id="fp-pv-batt" class="flow-line" d="M 875,151 L 320,151 L 320,400" stroke="#FFCC00" fill="none"/>
  <!-- Battery (405,485) ↔ House (875,485): horizontal -->
  <path id="fp-batt"    class="flow-line" d="M 405,485  L 875,485"   stroke="#CC99FF"/>
  <!-- House (1045,485) ↔ Grid (1515,485): horizontal -->
  <path id="fp-grid"    class="flow-line" d="M 1045,485 L 1515,485"  stroke="#66CCBB"/>
  <!-- Solar (1045,151) → Wallbox (1515,151): horizontal -->
  <path id="fp-wb-pv"   class="flow-line" d="M 1045,151 L 1515,151"  stroke="#99CCFF"/>
  <!-- Wallbox (1600,236) → Grid (1600,400): vertical -->
  <path id="fp-wb-grid" class="flow-line" d="M 1600,236  L 1600,400" stroke="#99CCFF"/>
  <!-- Grid (1515,485) → Battery (405,485): routed below via y:560 -->
  <path id="fp-grid-batt" class="flow-line" d="M 1515,485 L 1515,560 L 320,560 L 320,485" stroke="#FF9C7A" fill="none"/>

  <!-- ── Flow power labels (shown on active paths) ─────────────── -->
  <text id="fl-pv"      x="990"  y="318" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFCC00" opacity="0"/>
  <text id="fl-pv-batt" x="560" y="136" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFCC00" opacity="0"/>
  <text id="fl-batt"    x="590"  y="475" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#CC99FF" opacity="0"/>
  <text id="fl-grid"    x="1200" y="475" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#66CCBB" opacity="0"/>
  <text id="fl-wb"      x="1280" y="136" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#99CCFF" opacity="0"/>
  <text id="fl-grid-batt" x="900" y="580" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#FF9C7A" opacity="0"/>

  <!-- ══ PV NODE (960, 151) ════════════════════════════════════════ -->
  <g transform="translate(960,151)">
    <circle class="node-ring" r="108" fill="rgba(255,204,0,0.10)" stroke="rgba(255,204,0,0.25)" stroke-width="1.5"/>
    <circle r="85" fill="rgba(255,204,0,0.07)" stroke="#FFCC00" stroke-width="1.5"/>
    <text y="-8"  text-anchor="middle" dominant-baseline="middle" font-size="38" font-family="system-ui">☀️</text>
    <text id="vn-pv" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" font-weight="700" fill="#fff">–</text>
    <text y="-125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#FFCC00">SOLAR</text>
  </g>

  <!-- ══ BATTERY NODE (320, 485) ══════════════════════════════════ -->
  <g transform="translate(320,485)">
    <circle class="node-ring" r="108" fill="rgba(204,153,255,0.10)" stroke="rgba(204,153,255,0.25)" stroke-width="1.5"/>
    <circle r="85" fill="rgba(204,153,255,0.07)" stroke="#CC99FF" stroke-width="1.5"/>
    <text id="vn-batt-soc" y="-4"  text-anchor="middle" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#CC99FF">–</text>
    <text id="vn-batt-rem" y="28"  text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#666680">–</text>
    <text id="vn-batt-dir" y="56"  text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#666680" opacity="0">–</text>
    <text y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#CC99FF">BATTERIE</text>
  </g>

  <!-- ══ HOUSE NODE (960, 485) ════════════════════════════════════ -->
  <g transform="translate(960,485)">
    <circle class="node-ring" r="108" fill="rgba(68,136,255,0.10)" stroke="rgba(68,136,255,0.25)" stroke-width="1.5"/>
    <circle r="85" fill="rgba(68,136,255,0.07)" stroke="#4488FF" stroke-width="1.5"/>
    <text y="-8"  text-anchor="middle" dominant-baseline="middle" font-size="38" font-family="system-ui">🏠</text>
    <text id="vn-house" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" font-weight="700" fill="#fff">–</text>
    <text y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#4488FF">HAUS</text>
  </g>

  <!-- ══ GRID NODE (1600, 485) ════════════════════════════════════ -->
  <g transform="translate(1600,485)">
    <circle class="node-ring" r="108" fill="rgba(102,204,187,0.10)" stroke="rgba(102,204,187,0.25)" stroke-width="1.5"/>
    <circle r="85" fill="rgba(102,204,187,0.07)" stroke="#66CCBB" stroke-width="1.5"/>
    <text y="-8"  text-anchor="middle" dominant-baseline="middle" font-size="38" font-family="system-ui">⚡</text>
    <text id="vn-grid"     y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" font-weight="700" fill="#fff">–</text>
    <text id="vn-grid-dir" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#666680" opacity="0">–</text>
    <text y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#66CCBB">NETZ</text>
  </g>

  <!-- ══ WALLBOX NODE (1600, 151) — oben rechts, über NETZ ════════ -->
  <g transform="translate(1600,151)">
    <circle id="wb-ring" class="node-ring node-ring-off" r="108" fill="rgba(153,204,255,0.10)" stroke="rgba(153,204,255,0.25)" stroke-width="1.5"/>
    <circle r="85" fill="rgba(153,204,255,0.07)" stroke="#99CCFF" stroke-width="1.5"/>
    <text y="-8"  text-anchor="middle" dominant-baseline="middle" font-size="38" font-family="system-ui">🚗</text>
    <text id="vn-wb" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" font-weight="700" fill="#fff">–</text>
    <text y="-125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#99CCFF">WALLBOX</text>
  </g>

</svg>

<!-- ══ BOTTOM DATA STRIP ════════════════════════════════════════════════════ -->
<div id="data-strip">

  <div class="d-card" style="border-color:rgba(255,204,0,0.25);">
    <div class="d-label" style="color:var(--yellow);">Autarkie</div>
    <div class="d-val d-val-lg" id="d-autarkie">–</div>
  </div>

  <div class="d-card" style="border-color:rgba(255,204,0,0.15);">
    <div class="d-label" style="color:var(--yellow);">PV Heute</div>
    <div class="d-val" id="d-pv-day">–</div>
  </div>

  <div class="d-card" style="border-color:rgba(255,204,0,0.15);">
    <div class="d-label" style="color:var(--yellow);">PV Forecast</div>
    <div class="d-val" id="d-forecast">–</div>
  </div>

  <div class="d-card" style="border-color:rgba(102,204,187,0.2);">
    <div class="d-label" style="color:var(--teal2);">Netzbezug Heute</div>
    <div class="d-val" id="d-bezug-day">–</div>
  </div>

  <div class="d-card" style="border-color:rgba(68,136,255,0.2);">
    <div class="d-label" style="color:var(--blue);">Verbrauch Heute</div>
    <div class="d-val" id="d-load-day">–</div>
  </div>

  <div class="d-card" style="border-color:rgba(204,153,255,0.25);">
    <div class="d-label" style="color:var(--purple);">Batterie Ladestand</div>
    <div class="d-val d-val-lg" id="d-batt-soc" style="color:var(--purple);">–</div>
  </div>

  <div class="d-card" style="border-color:rgba(204,153,255,0.15);">
    <div class="d-label" style="color:var(--purple);">Restkapazität</div>
    <div class="d-val" id="d-batt-rem-strip">–</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="config.js"></script>
<script>
// ── Fit SVG viewBox to actual rendered size ────────────────────────────────
function fitViewBox() {
  const svg = document.getElementById('flow-svg');
  const w = svg.clientWidth || 1920;
  const h = svg.clientHeight || 906;
  // Add 20px top margin so the SOLAR/WALLBOX labels don't clip at the iframe edge
  svg.setAttribute('viewBox', `0 -20 ${w} ${h}`);
  // Scale node positions from reference (1920×906) to actual size
  const sx = w / 1920, sy = h / 906;
  const nodes = [
    { x: 960,  y: 151, el: svg.querySelectorAll('g')[0] }, // SOLAR
    { x: 320,  y: 485, el: svg.querySelectorAll('g')[1] }, // BATT
    { x: 960,  y: 485, el: svg.querySelectorAll('g')[2] }, // HOUSE
    { x: 1600, y: 485, el: svg.querySelectorAll('g')[3] }, // GRID
    { x: 1600, y: 151, el: svg.querySelectorAll('g')[4] }, // WALLBOX
  ];
  nodes.forEach(n => n.el && n.el.setAttribute('transform', `translate(${Math.round(n.x*sx)},${Math.round(n.y*sy)})`));
  const paths = [
    { id:'fp-pv',      x1:960,  y1:236, x2:960,  y2:400 },
    { id:'fp-batt',    x1:405,  y1:485, x2:875,  y2:485 },
    { id:'fp-grid',    x1:1045, y1:485, x2:1515, y2:485 },
    { id:'fp-wb-pv',   x1:1045, y1:151, x2:1515, y2:151 },
    { id:'fp-wb-grid', x1:1600, y1:236, x2:1600, y2:400 },
  ];
  paths.forEach(p => {
    const el = document.getElementById(p.id); if (!el) return;
    el.setAttribute('d', `M ${Math.round(p.x1*sx)},${Math.round(p.y1*sy)} L ${Math.round(p.x2*sx)},${Math.round(p.y2*sy)}`);
  });
  // L-shaped path: Solar left edge → Battery x → Battery top edge
  const pvBattEl = document.getElementById('fp-pv-batt');
  if (pvBattEl) {
    pvBattEl.setAttribute('d',
      `M ${Math.round(875*sx)},${Math.round(151*sy)} L ${Math.round(320*sx)},${Math.round(151*sy)} L ${Math.round(320*sx)},${Math.round(400*sy)}`
    );
  }
  const labels = [
    { id:'fl-pv',      x:990,  y:318 },
    { id:'fl-pv-batt', x:560,  y:136 },
    { id:'fl-batt',    x:590,  y:475 },
    { id:'fl-grid',    x:1200, y:475 },
    { id:'fl-wb',      x:1280, y:136 },
  ];
  labels.forEach(l => {
    const el = document.getElementById(l.id); if (!el) return;
    el.setAttribute('x', Math.round(l.x*sx));
    el.setAttribute('y', Math.round(l.y*sy));
  });
}
window.addEventListener('load', fitViewBox);
window.addEventListener('resize', fitViewBox);

// ── OIDs ──────────────────────────────────────────────────────────────────
const OIDs = {
  pv:          'modbus.0.inputRegisters.5016_Total_DC_Power',
  load:        'modbus.0.inputRegisters.13007_Load_power_',
  bezug:       '0_userdata.0.Photovoltaik.Smartmeter-EVN.SmartMeter-EVN-Bezug',
  einspeisung: '0_userdata.0.Photovoltaik.Smartmeter-EVN.SmartMeter-EVN-Einspeisung',
  autarkie:    '0_userdata.0.Photovoltaik.Autarkie',
  battSoc:     'bydhvs.0.State.SOC',
  battRem:     '0_userdata.0.Photovoltaik.Battery.Battery-Remaining-Capacity',
  wbPower:     '0_userdata.0.Photovoltaik.Wallbox.Wallbox-Leistung-Aktuell',
  wbPowerGrid: '0_userdata.0.Photovoltaik.Wallbox.Wallbox-Leistung-Grid',
  wbPowerPV:   '0_userdata.0.Photovoltaik.Wallbox.Wallbox-Leistung-PV',
  pvToLoad:    '0_userdata.0.Photovoltaik.PvToLoad',
  gridToLoad:  '0_userdata.0.Photovoltaik.GridToLoad',
  batToLoad:   '0_userdata.0.Photovoltaik.BatToLoad',
  pvToGrid:    '0_userdata.0.Photovoltaik.PvToGrid',
  gridToBat:   '0_userdata.0.Photovoltaik.GridToBat',
  pvToBat:     '0_userdata.0.Photovoltaik.PvToBat',
  pvDay:       'modbus.0.inputRegisters.13001_Daily_PV_Generation',
  bezugDay:    'modbus.0.inputRegisters.13035_Daily_Import_Energy',
  loadDay:     'sourceanalytix.0.modbus__0__inputRegisters__13007_Load_power_.currentYear.consumed.01_currentDay',
  forecast:    '0_userdata.0.Photovoltaik.PV-Forecast',
};

// ── Live values ────────────────────────────────────────────────────────────
const live = { pv: 0, load: 0, bezug: 0, einspeisung: 0, wbPower: 0, wbPowerGrid: 0, wbPowerPV: 0, pvToLoad: 0, gridToLoad: 0, batToLoad: 0, pvToGrid: 0, gridToBat: 0, pvToBat: 0 };
const THRESH = (typeof LUMINA_CONFIG !== 'undefined') ? LUMINA_CONFIG.flowThreshold : 100;

// ── Helpers ────────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }
function setText(id, v) { const e = el(id); if (e) e.textContent = v; }
function setHTML(id, v) { const e = el(id); if (e) e.innerHTML = v; }
function setSvgAttr(id, attr, v) { const e = el(id); if (e) e.setAttribute(attr, v); }

function fmtW(w) {
  const n = Math.abs(parseFloat(w));
  if (isNaN(n)) return '–';
  return n >= 1000 ? (n / 1000).toFixed(2) + ' kW' : Math.round(n) + ' W';
}

// ── Flow control ───────────────────────────────────────────────────────────
function setFlow(pathId, on, reverse) {
  const p = el(pathId); if (!p) return;
  p.classList.remove('flow-on', 'flow-rev');
  if (on) p.classList.add(reverse ? 'flow-rev' : 'flow-on');
}

function setFlowLabel(id, text, visible, color) {
  const e = el(id); if (!e) return;
  e.textContent = text;
  e.setAttribute('opacity', visible ? '1' : '0');
  if (color) e.setAttribute('fill', color);
}

// ── Update flows from live state ───────────────────────────────────────────
function updateFlows() {
  const { pv, load, bezug, einspeisung, wbPower, wbPowerGrid, wbPowerPV } = live;

  // Net grid: positive = importing, negative = exporting (3-phase meter fix)
  const netGrid  = bezug - einspeisung;
  const effBezug = Math.max(0,  netGrid);
  const effEinsp = Math.max(0, -netGrid);

  // Battery net power: positive = charging, negative = discharging
  const battPow = pv + effBezug - effEinsp - load - wbPower;
  const battCharge = battPow > THRESH;
  const battDisch  = battPow < -THRESH;
  const battOn     = battCharge || battDisch;

  // Grid
  const gridImp = effBezug > THRESH;
  const gridExp = effEinsp > THRESH;
  const gridOn  = gridImp || gridExp;
  const gridPow = gridImp ? effBezug : effEinsp;

  // PV → House (direct OID)
  const pvOn = pv > THRESH;
  const pvHouseOn = live.pvToLoad > THRESH;
  setFlow('fp-pv', pvHouseOn, false);
  setFlowLabel('fl-pv', pvHouseOn ? fmtW(live.pvToLoad) : '', pvHouseOn, '#FFCC00');
  setText('vn-pv', pvOn ? fmtW(pv) : '–');

  // PV → Battery (direct OID)
  const pvBattOn = live.pvToBat > THRESH;
  setFlow('fp-pv-batt', pvBattOn, false);
  setFlowLabel('fl-pv-batt', pvBattOn ? fmtW(live.pvToBat) : '', pvBattOn, '#FFCC00');

  // Battery → House (direct OID)
  const batHouseOn = live.batToLoad > THRESH;
  const battColor = '#FF9900';
  el('fp-batt').style.stroke = battColor;
  setFlow('fp-batt', batHouseOn, false);
  setFlowLabel('fl-batt', batHouseOn ? fmtW(live.batToLoad) : '', batHouseOn, battColor);
  const bdEl = el('vn-batt-dir');
  if (bdEl) {
    bdEl.textContent = battCharge ? 'LADEN' : battDisch ? 'ENTLADEN' : '';
    bdEl.setAttribute('opacity', battOn ? '1' : '0');
    bdEl.setAttribute('fill', battCharge ? '#44CC88' : '#FF9900');
  }

  // Grid ↔ House
  // Path direction: left(House) → right(Grid)
  // flow-on (fwd) = exporting (house→grid)
  // flow-rev      = importing (grid→house)
  const gridColor = gridImp ? '#FF5555' : '#66CCBB';
  el('fp-grid').style.stroke = gridColor;
  setFlow('fp-grid', gridOn, gridImp);
  setFlowLabel('fl-grid', gridOn ? fmtW(gridPow) : '', gridOn, gridColor);
  const gnEl = el('vn-grid');
  if (gnEl) {
    gnEl.textContent = gridOn ? fmtW(gridPow) : '–';
    gnEl.setAttribute('fill', gridImp ? '#FF5555' : gridExp ? '#44CC88' : '#fff');
  }
  const gdEl = el('vn-grid-dir');
  if (gdEl) {
    gdEl.textContent = gridImp ? 'BEZUG' : gridExp ? 'EINSPEISUNG' : '';
    gdEl.setAttribute('opacity', gridOn ? '1' : '0');
    gdEl.setAttribute('fill', gridColor);
  }

  // Wallbox: Solar → WB (horizontal) always when charging
  // WB → Grid (vertical) only when wallbox draws from grid
  const wbOn = wbPower > THRESH;
  const wbFromGrid = wbPowerGrid > THRESH;
  setFlow('fp-wb-pv',   wbOn, false);
  setFlow('fp-wb-grid', wbFromGrid, false);
  setFlowLabel('fl-wb', wbOn ? fmtW(wbPower) : '', wbOn, '#99CCFF');
  setText('vn-wb', wbOn ? fmtW(wbPower) : '–');

  // Grid → Battery (direct OID)
  const gridBattOn = live.gridToBat > THRESH;
  setFlow('fp-grid-batt', gridBattOn, false);
  setFlowLabel('fl-grid-batt', gridBattOn ? fmtW(live.gridToBat) : '', gridBattOn, '#FF9C7A');
  const wbRing = el('wb-ring');
  if (wbRing) wbRing.className.baseVal = wbOn ? 'node-ring' : 'node-ring node-ring-off';

  // House load
  setText('vn-house', load > THRESH ? fmtW(load) : '–');
}

// ── Apply incoming state ───────────────────────────────────────────────────
function applyState(oid, val) {
  const n = parseFloat(val);
  switch (oid) {
    case OIDs.pv:          live.pv          = isNaN(n) ? 0 : n; updateFlows(); break;
    case OIDs.load:        live.load        = isNaN(n) ? 0 : n; updateFlows(); break;
    case OIDs.bezug:       live.bezug       = isNaN(n) ? 0 : n; updateFlows(); break;
    case OIDs.einspeisung: live.einspeisung = isNaN(n) ? 0 : n; updateFlows(); break;
    case OIDs.wbPower:     live.wbPower     = isNaN(n) ? 0 : n * 1000; updateFlows(); break;
    case OIDs.wbPowerGrid: live.wbPowerGrid = isNaN(n) ? 0 : n;        updateFlows(); break;
    case OIDs.wbPowerPV:   live.wbPowerPV   = isNaN(n) ? 0 : n;        updateFlows(); break;
    case OIDs.pvToLoad:    live.pvToLoad    = isNaN(n) ? 0 : n * 1000; updateFlows(); break;
    case OIDs.gridToLoad:  live.gridToLoad  = isNaN(n) ? 0 : n * 1000; updateFlows(); break;
    case OIDs.batToLoad:   live.batToLoad   = isNaN(n) ? 0 : n * 1000; updateFlows(); break;
    case OIDs.pvToGrid:    live.pvToGrid    = isNaN(n) ? 0 : n * 1000; updateFlows(); break;
    case OIDs.gridToBat:   live.gridToBat   = isNaN(n) ? 0 : n * 1000; updateFlows(); break;
    case OIDs.pvToBat:     live.pvToBat     = isNaN(n) ? 0 : n * 1000; updateFlows(); break;

    case OIDs.autarkie:
      setHTML('d-autarkie', isNaN(n) ? '–' : Math.round(n) + '<span class="u">%</span>');
      break;

    case OIDs.battSoc: {
      const soc = isNaN(n) ? '–' : Math.round(n) + '%';
      setText('vn-batt-soc', soc);
      setHTML('d-batt-soc', isNaN(n) ? '–' : Math.round(n) + '<span class="u">%</span>');
      const socEl = el('vn-batt-soc');
      if (socEl) socEl.setAttribute('fill', n <= 20 ? '#FF5555' : n <= 40 ? '#FFAA00' : '#CC99FF');
      break;
    }

    case OIDs.battRem: {
      const rem = isNaN(n) ? '–' : n.toFixed(1) + ' kWh';
      setText('vn-batt-rem', rem);
      setHTML('d-batt-rem-strip', isNaN(n) ? '–' : n.toFixed(1) + '<span class="u"> kWh</span>');
      break;
    }

    case OIDs.pvDay:    setHTML('d-pv-day',    isNaN(n) ? '–' : n.toFixed(1) + '<span class="u"> kWh</span>'); break;
    case OIDs.bezugDay: setHTML('d-bezug-day', isNaN(n) ? '–' : n.toFixed(1) + '<span class="u"> kWh</span>'); break;
    case OIDs.loadDay:  setHTML('d-load-day',  isNaN(n) ? '–' : n.toFixed(1) + '<span class="u"> kWh</span>'); break;
    case OIDs.forecast: setHTML('d-forecast',  isNaN(n) ? '–' : n.toFixed(1) + '<span class="u"> kWh</span>'); break;
  }
}

// ── Socket.io ──────────────────────────────────────────────────────────────
const socket  = io({ path: '/socket.io' });
const allOids = Object.values(OIDs);

socket.on('connect', () => {
  allOids.forEach(oid => {
    socket.emit('subscribe', oid, { ack: true }, () => {});
    socket.emit('getStates', [oid], (err, states) => {
      if (!states) return;
      const e = states[oid];
      if (!e || e.val === null || e.val === undefined) return;
      applyState(oid, e.val);
    });
  });
});
socket.on('disconnect', () => {});
socket.on('stateChange', (oid, state) => {
  if (!state || state.val === null || state.val === undefined) return;
  applyState(oid, state.val);
});

// Periodic refresh every 5 minutes
setInterval(() => {
  if (!socket || !socket.connected) return;
  allOids.forEach(oid => socket.emit('getStates', [oid], (err, states) => {
    if (!states) return;
    const e = states[oid];
    if (!e || e.val === null || e.val === undefined) return;
    applyState(oid, e.val);
  }));
}, 300000);
</script>
