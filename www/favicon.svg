<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF9900"/>
      <stop offset="25%"  stop-color="#FFCC00"/>
      <stop offset="50%"  stop-color="#4488FF"/>
      <stop offset="75%"  stop-color="#CC99FF"/>
      <stop offset="100%" stop-color="#FF8866"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0c0c15"/>
  <!-- House outline -->
  <polygon points="50,12 88,46 80,46 80,83 20,83 20,46 12,46" fill="none" stroke="#FF9900" stroke-width="6" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="39" y="58" width="22" height="25" rx="2" fill="none" stroke="#FF9900" stroke-width="5"/>
  <!-- WiFi/signal arcs -->
  <path d="M42,45 a11,11 0 0,1 16,0" fill="none" stroke="#FF9900" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M37,40 a18,18 0 0,1 26,0" fill="none" stroke="#FF9900" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3.5" fill="#FF9900"/>
  <!-- Rainbow gradient bar at bottom -->
  <rect x="12" y="91" width="76" height="4" rx="2" fill="url(#rg)"/>
</svg>
