<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Lumina Home</title>
<link rel="shortcut icon" href="favicon32.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
*, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --lfw:    105px;   /* sidebar width */
  --bar-h:   26px;   /* LCARS strip height */
  --elbow-r: 42px;   /* elbow border-radius */
  --gap:      4px;   /* inter-panel dark gap */

  /* Palette — LCARS exact codes + dashboard recommendations */
  --violet:       #B59CFF;   /* LCARS Hell-Lila   — large elbow, main strip */
  --orange:       #F5B14C;   /* LCARS Orange      — large elbow, accent */
  --gold:         #D98A2B;   /* LCARS Dunkelorange */
  --almond:       #D78CFF;   /* LCARS Rosa */
  --bluey:        #6F86FF;   /* LCARS Blau-Lila */
  --teal:         #6AAEFF;   /* LCARS Blue */
  --moonlit:      #9B7CFF;   /* LCARS Purple */
  --butterscotch: #FFBE88;   /* LCARS Apricot — hover / active */
  --beige:        #CCB48C;   /* LCARS Beige */
  --peach:        #FF9C7A;   /* LCARS Peach */
  --red:          #F07C7C;   /* LCARS Salmon — tiny end accent */
  --glow:         #52E5FF;   /* Lines / Glow */
  --bg:           #05070D;   /* Background */
  --panel-bg:     #0A1020;   /* Panel / iframe */
  --panel-bd:     var(--gap) solid var(--bg);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #05070D;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  color: #fff;
  user-select: none;
}

/* Outer padding creates the thin black border around the whole frame */
#lcars-wrap {
  width: 100vw;
  height: 100vh;
  padding: 8px 12px;
  background: var(--bg);
  display: flex;
  gap: var(--gap);
}

/* ══ LEFT SIDEBAR ══════════════════════════════════════════════════ */
#sidebar {
  width: var(--lfw);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

/* Top elbow: large rounded top-left corner */
#elbow-top {
  background: var(--violet);
  border-radius: var(--elbow-r) 0 0 0;
  height: 100px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: flex-start;
  padding: 12px 12px 10px;
  color: #000;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.3;
}

/* Sidebar panels — flat rectangles, right-aligned text */
.sb-panel {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 6px 12px;
  color: #000;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.25;
  transition: filter 0.12s;
}
.sb-hop {
  font-size: 9px;
  opacity: 0.55;
  letter-spacing: 0.5px;
  margin-bottom: 1px;
}

/* Clickable nav panels */
.nav-item { cursor: pointer; }
.nav-item:hover  { filter: brightness(115%); }
.nav-item.active { background: #FF5555 !important; box-shadow: none; filter: none; }

/* Bottom elbow: large rounded bottom-left corner, fills rest */
#elbow-bottom {
  background: var(--orange);
  border-radius: 0 0 0 var(--elbow-r);
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 10px 12px;
  color: rgba(0,0,0,0.8);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: right;
  gap: 3px;
}
.conn-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--glow);
  box-shadow: 0 0 7px var(--glow);
  animation: blink 3s ease-in-out infinite;
  margin-left: auto;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ══ RIGHT AREA ════════════════════════════════════════════════════ */
#right {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Header zone — same height as elbow-top */
#hdr-zone {
  height: 100px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  padding-top: 12px;
  padding-left: 20px;
  position: relative;
}

#banner {
  font-size: 28px;
  font-weight: 300;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: 8px;
  line-height: 1;
  flex: 1;
  position: relative; z-index: 2;
}
#banner-sub {
  display: block;
  font-size: 13px;
  font-weight: 400;
  color: var(--violet);
  letter-spacing: 4px;
  margin-top: 5px;
}

#hdr-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: flex-start;
  padding-top: 0px;
  gap: 4px;
  position: relative; z-index: 2;
}
#hdr-time {
  font-size: 34px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
#hdr-date {
  font-size: 11px;
  color: var(--violet);
  letter-spacing: 1px;
}

/* Bar strips — positioned inside hdr-zone at bottom */
#bar-top {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--bar-h);
  display: flex;
  gap: var(--gap);
  z-index: 2;
}
.bar {
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 9px;
  overflow: hidden;
  white-space: nowrap;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.55);
}
.b1  { flex: 4;    background: var(--violet); }
.b2  { flex: 0.4;  background: var(--orange); padding: 0; }
.b3  { flex: 1.4;  background: var(--moonlit); }
.b4  { flex: 0.4;  background: var(--teal); padding: 0; }
.b5  { flex: 2.2;  background: var(--bluey); }
.b6  { flex: 0.4;  background: var(--orange); padding: 0; }
.b7  { flex: 3.5;  background: var(--violet); }
.b8  { flex: 0.4;  background: var(--moonlit); padding: 0; }

/* Iframe — fills rest */
#main-frame {
  flex: 1;
  border: none;
  width: 100%;
  min-height: 0;
  display: block;
  background: var(--panel-bg);
}

/* Bottom bar strips */
#bar-bottom {
  height: var(--bar-h);
  flex-shrink: 0;
  display: flex;
  gap: var(--gap);
}
.bb1 { flex: 3;   background: var(--orange); }
.bb2 { flex: 0.4; background: var(--gold);   padding: 0; }
.bb3 { flex: 1.8; background: var(--violet); }
.bb4 { flex: 0.4; background: var(--orange); padding: 0; }
.bb5 { flex: 5;   background: var(--moonlit); }
.bb6 { flex: 0.4; background: var(--teal);   padding: 0; }
.bb7 { flex: 2.2; background: var(--teal); }
.bb8 { flex: 0.4; background: var(--moonlit); padding: 0; }

/* ══ RIGHT ACCENT BAR ══════════════════════════════════════════════ */
#rightbar {
  width: 12px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  margin-left: var(--gap);
}
#rb1 { height: 200px; flex-shrink: 0; background: var(--violet); border-radius: 0 6px 0 0; }
#rb2 { flex: 1; background: var(--moonlit); }
#rb3 { height: 60px;  flex-shrink: 0; background: var(--violet); border-radius: 0 0 6px 0; }
</style>
</head>
<body>

<div id="lcars-wrap">

  <!-- ══ SIDEBAR ══════════════════════════════════════════════════ -->
  <div id="sidebar">

    <div id="elbow-top">
      LUMINA<br>
      <span class="sb-hop">KW · HOME ENERGY</span>
    </div>

    <div class="sb-panel nav-item active" data-page="dashboard.html"
         style="background:var(--violet); height:64px;">
      <span class="sb-hop">01 · OVERVIEW</span>
      Dashboard
    </div>
    <div class="sb-panel nav-item" data-page="energie.html"
         style="background:var(--orange); height:64px;">
      <span class="sb-hop">02 · PV · BATT</span>
      Energie
    </div>
    <div class="sb-panel nav-item" data-page="cards.html"
         style="background:var(--bluey); height:64px;">
      <span class="sb-hop">03 · CARDS</span>
      Übersicht
    </div>
    <div class="sb-panel" style="background:var(--teal); height:58px;">
      <span class="sb-hop">04 · TEMP</span>
      Pool
    </div>
    <div class="sb-panel" style="background:var(--almond); height:58px;">
      <span class="sb-hop">05 · EBUSD</span>
      Heizung
    </div>
    <div class="sb-panel" style="background:var(--beige); height:58px;">
      <span class="sb-hop">06 · STATUS</span>
      System
    </div>


    <div id="elbow-bottom">
      <div class="conn-dot" id="sb-conn-dot"></div>
      <div id="sb-conn-text">Offline</div>
      <span class="sb-hop" style="opacity:0.45;">LC · 47-1287</span>
    </div>

  </div>

  <!-- ══ RIGHT AREA ════════════════════════════════════════════════ -->
  <div id="right">

    <div id="hdr-zone">
      <div id="banner">
        Home Dashboard
      </div>
      <div id="hdr-right">
        <div id="hdr-time">--:--</div>
        <div id="hdr-date">—</div>
      </div>
      <div id="bar-top">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3">KW-01</div>
        <div class="bar b4"></div>
        <div class="bar b5">4710-SYS</div>
        <div class="bar b6"></div>
        <div class="bar b7">Home Automation</div>
        <div class="bar b8"></div>
      </div>
    </div>

    <iframe id="main-frame" src="dashboard.html"></iframe>

    <div id="bar-bottom">
      <div class="bar bb1"></div>
      <div class="bar bb2"></div>
      <div class="bar bb3"></div>
      <div class="bar bb4"></div>
      <div class="bar bb5"></div>
      <div class="bar bb6"></div>
      <div class="bar bb7"></div>
      <div class="bar bb8"></div>
    </div>

  </div>

  <!-- ══ RIGHT ACCENT BAR ══════════════════════════════════════════ -->
  <div id="rightbar">
    <div id="rb1"></div>
    <div id="rb2"></div>
    <div id="rb3"></div>
  </div>

</div>

<script>
const frame = document.getElementById('main-frame');

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    frame.src = btn.dataset.page;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

function updateClock() {
  const now = new Date();
  document.getElementById('hdr-time').textContent =
    now.getHours().toString().padStart(2, '0') + ':' +
    now.getMinutes().toString().padStart(2, '0');
  document.getElementById('hdr-date').textContent =
    now.toLocaleDateString('de-AT', { weekday:'short', day:'2-digit', month:'short' });
}
updateClock();
setInterval(updateClock, 10000);
</script>

<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  const dot  = document.getElementById('sb-conn-dot');
  const text = document.getElementById('sb-conn-text');
  const sock = io({ path: '/socket.io' });
  sock.on('connect',    () => { dot.style.background = ''; dot.style.boxShadow = ''; text.textContent = 'Online';  });
  sock.on('disconnect', () => { dot.style.background = '#CC2200'; dot.style.boxShadow = 'none'; text.textContent = 'Offline'; });
})();
</script>

</body>
</html>
